<!DOCTYPE html>
<html>
<head>
    <title>ESL Flashcard Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        img {
            width: 100%;
            max-width: 300px;
            height: auto;
            object-fit: contain;
            margin: 20px 0;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 80%;
            max-width: 250px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 5px;
            cursor: pointer;
        }

        #message {
            font-size: 20px;
            margin-top: 15px;
            font-weight: bold;
        }

        #hint {
            font-size: 18px;
            margin: 10px 0;
            color: #333;
        }

        #endCard {
            display: none;
            font-size: 24px;
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="container">

<h1>ESL Flashcard Game</h1>

<div id="gameArea">
    <img id="flashcard" src="" alt="Flashcard"><br>
    <div id="hint"></div>
    <button id="speakBtn">🔊</button><br>
    <input type="text" id="answerInput" placeholder="Type your answer">
    <button id="submitBtn">Submit</button>
    <div id="message"></div>
</div>

<div id="endCard">
    <div id="finalScore"></div>
    <div>Thank you for playing!</div>
    <button id="restartBtn">Restart Game</button>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const words = [
        { word: "apple", hint: "A red fruit" },
        { word: "ball", hint: "You bounce it" },
        { word: "cat", hint: "It says 'Meow'" },
        { word: "dog", hint: "It says 'Woof'" },
        { word: "elephant", hint: "Big gray animal" },
        { word: "fish", hint: "Swims in water" },
        { word: "guitar", hint: "Musical instrument" },
        { word: "hat", hint: "Worn on the head" },
        { word: "icecream", hint: "Cold sweet treat" },
        { word: "juice", hint: "You drink it" },
        { word: "kite", hint: "Flies in the sky" },
        { word: "lion", hint: "King of the jungle" },
        { word: "moon", hint: "Shines at night" },
        { word: "nest", hint: "Birds live here" },
        { word: "orange", hint: "Citrus fruit" },
        { word: "penguin", hint: "Waddles in cold" },
        { word: "queen", hint: "Royal lady" },
        { word: "rabbit", hint: "Hops around" },
        { word: "sun", hint: "Bright star in sky" },
        { word: "tree", hint: "Has leaves" },
        { word: "umbrella", hint: "Protects from rain" },
        { word: "violin", hint: "String instrument" },
        { word: "whale", hint: "Big sea animal" },
        { word: "xylophone", hint: "Musical toy" },
        { word: "yacht", hint: "Luxury boat" },
        { word: "zebra", hint: "Black and white stripes" }
    ];

    let currentIndex = 0;
    let currentWord = "";
    let attempts = 0;
    let score = 0;
    let waitingForNext = false;
    let firstCardSpoken = false;

    const img = document.getElementById("flashcard");
    const input = document.getElementById("answerInput");
    const button = document.getElementById("submitBtn");
    const speakBtn = document.getElementById("speakBtn");
    const message = document.getElementById("message");
    const hintDiv = document.getElementById("hint");
    const gameArea = document.getElementById("gameArea");
    const endCard = document.getElementById("endCard");
    const finalScore = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    function speak(word) {
        const utterance = new SpeechSynthesisUtterance(word);
        window.speechSynthesis.speak(utterance);
    }

    function loadWord() {
        if (currentIndex >= words.length) {
            gameArea.style.display = "none";
            endCard.style.display = "block";
            finalScore.textContent = `Your score: ${score} / ${words.length}`;
            return;
        }

        attempts = 0;
        waitingForNext = false;
        message.textContent = "";
        input.value = "";
        input.disabled = false;
        button.disabled = false;
        button.textContent = "Submit";
        input.focus();

        currentWord = words[currentIndex].word;
        img.src = "images/" + currentWord + ".jpg";
        hintDiv.textContent = "Hint: " + words[currentIndex].hint;

        if (firstCardSpoken) {
            setTimeout(() => speak(currentWord), 100);
        } else {
            message.textContent = "Press 🔊 or Enter to hear the word";
        }
    }

    function checkAnswer() {

        if (!firstCardSpoken) firstCardSpoken = true;

        if (waitingForNext) {
            currentIndex++;
            loadWord();
            return;
        }

        const userAnswer = input.value.trim().toLowerCase();

        if (userAnswer === currentWord) {
            message.style.color = "green";
            message.textContent = "✅ Correct!";
            score++;
            speak(currentWord);
            waitingForNext = true;
            button.textContent = "Next ➔";
            input.disabled = true;
        } else {
            attempts++;
            if (attempts >= 3) {
                message.style.color = "red";
                message.innerHTML = `❌ Correct spelling: <b>${currentWord}</b>`;
                speak(currentWord);
                waitingForNext = true;
                button.textContent = "Next ➔";
                input.disabled = true;
            } else {
                message.style.color = "orange";
                message.textContent = `❌ Try again! (${attempts}/3)`;
            }
        }
    }

    button.addEventListener("click", checkAnswer);

    speakBtn.addEventListener("click", function() {
        if (!firstCardSpoken) firstCardSpoken = true;
        speak(currentWord);
    });

    restartBtn.addEventListener("click", function() {
        currentIndex = 0;
        score = 0;
        firstCardSpoken = false;
        endCard.style.display = "none";
        gameArea.style.display = "block";
        loadWord();
    });

    document.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            if (endCard.style.display === "block") {
                restartBtn.click();
            } else {
                checkAnswer();
            }
        }
    });

    loadWord();

});
</script>

</body>
</html>
